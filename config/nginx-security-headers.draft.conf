# orthodoxmetrics.com — Security headers (DRAFT, NOT INSTALLED)
#
# Source: OMOD-1446 (Public site launch hardening, 2026-05-06)
# Status: REPO-ONLY DRAFT. Live nginx is unchanged. Operator action required.
#
# What this is for ─────────────────────────────────────────────────────────
# The current public response on https://orthodoxmetrics.com/ ships a bare
# header set: no HSTS, no CSP, no X-Content-Type-Options, no X-Frame-Options
# / frame-ancestors, no Referrer-Policy, no Permissions-Policy, and the
# nginx version leaks via the Server header (server_tokens default).
#
# This file proposes the headers we want to add to the public vhost,
# tested against the React SPA's actual asset graph (Vite bundles, MUI,
# AG Grid, Google Fonts, lucide / tabler icons inlined as SVG, Discord
# invite link in the FAQ, Helmet-injected JSON-LD, and the OmAssistant
# WebSocket on /ws/omai-logger).
#
# How to install ──────────────────────────────────────────────────────────
# 1. Copy this file to /etc/nginx/snippets/orthodoxmetrics-security.conf
#    (or paste directly into the existing snippet at
#    /etc/nginx/snippets/orthodoxmetrics-common.conf, near the top of the
#    443 server block, before the route blocks).
# 2. Set "server_tokens off;" in the global http {} block of nginx.conf
#    if it isn't already (this hides the version from the Server header).
# 3. nginx -t && systemctl reload nginx.
# 4. Verify with:
#       curl -skI --resolve orthodoxmetrics.com:443:127.0.0.1 \
#         https://orthodoxmetrics.com/ \
#         | grep -iE 'strict-transport|content-security|x-content|x-frame|referrer|permissions|server'
#
# Rollback: remove the snippet (or comment out the lines), nginx -t,
#           systemctl reload nginx.
#
# CSP scope ───────────────────────────────────────────────────────────────
# - 'self' covers all Vite-emitted JS/CSS/asset chunks served from the SPA dist.
# - https://fonts.googleapis.com / https://fonts.gstatic.com are required for
#   the Plus Jakarta Sans / Noto Sans / Noto Serif faces loaded in index.html.
# - 'unsafe-inline' on style-src is currently necessary because MUI's Emotion
#   layer injects style tags at runtime; once we ship a nonce-based provider
#   this can be tightened.
# - 'unsafe-eval' is intentionally NOT allowed.
# - connect-src includes wss:// for the live OmAssistant logger.
# - frame-ancestors 'none' is the modern equivalent of X-Frame-Options DENY.
# - report-to is left commented out — wire it up once we have a CSP report
#   collector running.

# ── Public response baseline ─────────────────────────────────────────────
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# ── Content-Security-Policy ──────────────────────────────────────────────
# Single-line form for nginx; logical groupings split with " ; " for
# readability — nginx treats the whole header value as one string.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://orthodoxmetrics.com; connect-src 'self' https://orthodoxmetrics.com wss://orthodoxmetrics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

# ── Compression / HTTP-2 (operator-managed, leave commented if already set) ─
# listen 443 ssl http2;       # in the server block
# brotli on;                  # requires nginx-extras / module
# brotli_comp_level 5;
# brotli_static on;
# gzip on;
# gzip_vary on;
# gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
